# API Gateway Configuration for Microservices

upstream produto_service {
    server produto-service:8001;
}

upstream pedido_service {
    server pedido-service:8002;
}

upstream calculo_service {
    server calculo-service:8003;
}

upstream auth_service {
    server auth-service:8004;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript;
    gzip_min_length 1000;
    
    # Default headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    
    # Root endpoint - API info
    location = / {
        default_type application/json;
        return 200 '{
            "service": "Sistema de Estoque - API Gateway",
            "version": "1.0.0",
            "endpoints": {
                "produtos": "/api/v1/produtos",
                "pedidos": "/api/v1/pedidos",
                "calculos": "/api/v1/calcular",
                "auth": "/api/v1/auth",
                "estrategias": "/api/v1/estrategias"
            },
            "docs": {
                "produtos": "/produtos/docs",
                "pedidos": "/pedidos/docs",
                "calculos": "/calculos/docs",
                "auth": "/auth/docs"
            },
            "health": "/health"
        }';
    }
    
    # Health check endpoint
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "api-gateway"}';
    }
    
    # =====================
    # Produto Service Routes
    # =====================
    location /produtos/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://produto_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    location /api/v1/produtos {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://produto_service/api/v1/produtos;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================
    # Pedido Service Routes
    # =====================
    location /pedidos/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://pedido_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    location /api/v1/pedidos {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://pedido_service/api/v1/pedidos;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================
    # Cálculo Service Routes
    # =====================
    location /calculos/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://calculo_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    location /api/v1/calcular {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://calculo_service/api/v1/calcular;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/v1/estrategias {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://calculo_service/api/v1/estrategias;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/v1/simular {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://calculo_service/api/v1/simular;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================
    # Auth Service Routes
    # =====================
    location /auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://auth_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    location /api/v1/auth {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://auth_service/api/v1/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================
    # Swagger Documentation
    # =====================
    location /produtos/docs {
        proxy_pass http://produto_service/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /produtos/openapi.json {
        proxy_pass http://produto_service/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /pedidos/docs {
        proxy_pass http://pedido_service/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /pedidos/openapi.json {
        proxy_pass http://pedido_service/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /calculos/docs {
        proxy_pass http://calculo_service/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /calculos/openapi.json {
        proxy_pass http://calculo_service/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /auth/docs {
        proxy_pass http://auth_service/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /auth/openapi.json {
        proxy_pass http://auth_service/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
